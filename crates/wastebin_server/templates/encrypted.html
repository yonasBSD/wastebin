{% extends "base.html" %}

{% block head %}
<script defer src="{{ page.assets.password_toggle_js.route() }}"></script>
{% endblock %}

{% block content %}
  <div class="flex-center">
    <div class="centered-label">encrypted paste</div>
    <form action="/{{ id }}" method="post">
      <div class="controls">
        <div class="password-input-wrap">
          <input type="password" id="password" name="password" placeholder="password …" autofocus>
          <button type="button" id="password-toggle" class="password-toggle" title="show password" aria-label="show password">
            <svg class="eye-show" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
            <svg class="eye-hide" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3l12 10"/><path d="M6.3 4.3A6.5 6.5 0 0 1 8 4c4.5 0 7 4 7 4a12 12 0 0 1-2.2 2.6"/><path d="M10.5 11.6A6.5 6.5 0 0 1 8 12c-4.5 0-7-4-7-4a12 12 0 0 1 3-3.2"/><path d="M6.6 6.6a2 2 0 0 0 2.8 2.8"/></svg>
          </button>
        </div>
        <button class="button">decrypt</button>
      </div>
    </form>
  </div>
{% endblock %}
