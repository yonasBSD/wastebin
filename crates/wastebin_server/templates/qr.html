{% extends "paste.html" %}

{% block qr_button %}{% endblock %}

{% block view_toggle %}
  <a id="view-toggle" href="/{{ key }}" class="nav-button" title="source view" aria-label="source view">
    <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4L2 8l4 4M10 4l4 4-4 4"/></svg>
  </a>
{% endblock %}

{% block content %}
  <div class="flex-center">
    <div class="centered-label">qr code</div>
    <div class="qr-container">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 {{ code.size() + 4 }} {{ code.size() + 4 }}" stroke="none" width="16rem">
        <rect width="100%" height="100%" fill="#fafafa"/>
        <path d="{% for (x, y) in self.dark_modules() %}M{{ x + 2 }},{{ y + 2 }}h1v1h-1z {% endfor %}" fill="#000000"/>
      </svg>
    </div>
  </div>
{% endblock %}
