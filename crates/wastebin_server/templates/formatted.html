{% extends "paste.html" %}

{% block view_toggle %}
  {% if is_markdown %}
    <a href="/md/{{ key }}" class="nav-button" title="rendered view" aria-label="rendered view">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 3.5h11a1 1 0 011 1v7a1 1 0 01-1 1h-11a1 1 0 01-1-1v-7a1 1 0 011-1z"/><path d="M4 10.5V5.5l2 2 2-2v5"/><path d="M10 5.5v5M10 10.5l1.5-1.5M10 10.5L8.5 9"/></svg>
    </a>
  {% endif %}
{% endblock %}

{% block content %}
  <div id="overlay">
    <div id="overlay-content">
      <table>
        <tr>
          <td><kbd>n</kbd></td>
          <td>Go home</td>
        </tr>
        <tr>
          <td><kbd>p</kbd></td>
          <td>Go here</td>
        </tr>
        <tr>
          <td><kbd>y</kbd></td>
          <td>Copy URL</td>
        </tr>
        <tr>
          <td><kbd>c</kbd></td>
          <td>Copy content</td>
        </tr>
        <tr>
          <td><kbd>d</kbd></td>
          <td>Download</td>
        </tr>
        <tr>
          <td><kbd>q</kbd></td>
          <td>Show QR code</td>
        </tr>
        <tr>
          <td><kbd>w</kbd></td>
          <td>Toggle line wrapping</td>
        </tr>
        <tr>
          <td><kbd>?</kbd></td>
          <td>Toggle help</td>
        </tr>
      </table>
    </div>
  </div>
  {{ html|safe }}
  {% if !is_available %}
  <script defer src="{{ page.assets.burn_js.route()}}"></script>
  {% endif %}
{% endblock %}
