{% extends "base.html" %}
{% block content %}
<div class="flex-center">
  <div class="centered-label">burn after reading</div>
  <div class="centered-body">
    Copy and send <a class="text-link" href="/{{ key }}">this link</a>.<br>
    The recipient will be shown a confirmation prompt; the paste is deleted the moment they confirm.
  </div>
  <div class="qr-container">
    <svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 {{ code.size() + 4 }} {{ code.size() + 4 }}" stroke="none" width="16rem">
      <rect width="100%" height="100%" fill="#fafafa"/>
      <path d="{% for (x, y) in self.dark_modules() %}M{{ x + 2 }},{{ y + 2 }}h1v1h-1z {% endfor %}" fill="#000000"/>
    </svg>
  </div>
</div>
{% endblock %}
